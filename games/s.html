<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* Integrating your s.css logic with Joboteen colors */
        :root { --accent: #00f2ff; --primary: #7000ff; --bg: #0d0d0d; }
        body { background: var(--bg); color: var(--accent); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .board { display: grid; grid-template-columns: repeat(9, 45px); gap: 2px; border: 4px solid var(--primary); padding: 5px; background: #1a1a1a; }
        .cell { width: 45px; height: 45px; background: #222; border: 1px solid #333; color: var(--accent); text-align: center; font-size: 18px; outline: none; }
        .cell:focus { background: #333; box-shadow: 0 0 10px var(--accent); }
        .neon-btn { margin-top: 20px; background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1 style="letter-spacing: 5px;">SUDOKU MIND GAME.</h1>
    <div id="sudoku-board" class="board"></div>
    <button onclick="createBoard()" class="neon-btn">RESTART</button>

    <script>
        const initialGrid = [
            [5, 3, 0, 0, 7, 0, 0, 0, 0], [6, 0, 0, 1, 9, 5, 0, 0, 0], [0, 9, 8, 0, 0, 0, 0, 6, 0],
            [8, 0, 0, 0, 6, 0, 0, 0, 3], [4, 0, 0, 8, 0, 3, 0, 0, 1], [7, 0, 0, 0, 2, 0, 0, 0, 6],
            [0, 6, 0, 0, 0, 0, 2, 8, 0], [0, 0, 0, 4, 1, 9, 0, 0, 5], [0, 0, 0, 0, 8, 0, 0, 7, 9]
        ];

        function createBoard() {
            const board = document.getElementById('sudoku-board');
            board.innerHTML = '';
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const cell = document.createElement('input');
                    cell.type = 'text'; cell.maxLength = 1; cell.className = 'cell';
                    if (initialGrid[r][c] !== 0) {
                        cell.value = initialGrid[r][c];
                        cell.readOnly = true;
                        cell.style.color = '#7000ff';
                    }
                    board.appendChild(cell);
                }
            }
        }
        createBoard();
    </script>
</body>
</html>
